<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Padrones - ATP</title>
    <style>
        /* Definición de colores ATP y variables */
        :root { 
            --bg: #f4f6f9; 
            --atp-blue: #2e5699; /* Azul Principal */
            --atp-pink: #f969d7; /* Rosa Acento */
            --card: #ffffff; 
            --text: #1a202c; 
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 1rem; display: flex; justify-content: center; }
        
        .container { max-width: 480px; width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* Estilos de la cabecera y Logo */
        .header { text-align: center; margin-bottom: 1.5rem; width: 100%; }
        .logo-atp { max-width: 180px; height: auto; margin-bottom: 1rem; }
        
        h1 { text-align: center; color: var(--atp-blue); font-size: 1.6rem; margin: 0 0 0.5rem 0; font-weight: 800; }
        .subtitle { text-align: center; color: #718096; font-size: 0.95rem; margin-bottom: 1.5rem; max-width: 80%; }

        /* Buscador */
        .search-box { width: 100%; padding: 1.1rem; font-size: 1.1rem; border: 2px solid #e2e8f0; border-radius: 1rem; outline: none; margin-bottom: 1rem; transition: all 0.2s; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
        .search-box:focus { border-color: var(--atp-pink); box-shadow: 0 0 0 3px rgba(249, 105, 215, 0.2); }

        /* Flyer y Link de propuestas */
        .flyer-atp { width: 100%; height: auto; border-radius: 1rem; box-shadow: var(--shadow); margin-bottom: 1rem; display: block; }
        
        .link-propuestas { display: block; text-align: center; color: var(--atp-pink); font-weight: 700; text-decoration: none; margin-bottom: 2rem; font-size: 1.1rem; transition: color 0.2s; padding: 0.5rem; border-radius: 0.5rem;}
        .link-propuestas:hover { color: #d64cb2; background-color: rgba(249, 105, 215, 0.1); }

        /* Tarjetas de Resultado */
        .card { background: var(--card); padding: 1.5rem; border-radius: 1rem; box-shadow: var(--shadow); margin-bottom: 1.25rem; border-left: 6px solid var(--atp-blue); width: 100%; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .card h2 { margin: 0 0 0.75rem 0; font-size: 1.2rem; color: var(--atp-blue); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;}
